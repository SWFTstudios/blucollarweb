<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stitch Design Preview - Blu Collar</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #12233a;
      --muted: #526176;
      --border: #dbe4ef;
      --brand: #16589a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      padding: 24px;
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(22, 88, 154, 0.08);
    }
    .card-head {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .card-head strong {
      font-size: 14px;
    }
    .card-head a {
      color: var(--brand);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    iframe {
      width: 100%;
      height: 620px;
      border: 0;
      display: block;
      background: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Blu Collar Stitch Screen Previews</h1>
    <p>Live local previews of the exported Stitch pages. Open each page in a new tab for full-size review.</p>
  </header>
  <main>
    <section class="card">
      <div class="card-head">
        <strong>Landing Page</strong>
        <a href="./landing.html" target="_blank" rel="noopener noreferrer">Open Full Page</a>
      </div>
      <iframe src="./landing.html" title="Landing Page Preview"></iframe>
    </section>
    <section class="card">
      <div class="card-head">
        <strong>Pricing Page</strong>
        <a href="./pricing.html" target="_blank" rel="noopener noreferrer">Open Full Page</a>
      </div>
      <iframe src="./pricing.html" title="Pricing Page Preview"></iframe>
    </section>
    <section class="card">
      <div class="card-head">
        <strong>Contact Page</strong>
        <a href="./contact.html" target="_blank" rel="noopener noreferrer">Open Full Page</a>
      </div>
      <iframe src="./contact.html" title="Contact Page Preview"></iframe>
    </section>
  </main>
</body>
</html>
